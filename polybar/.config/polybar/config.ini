[colors]
background  = #191724
surface     = #1f1d2e
border      = #26233a
foreground  = #e0def4
primary     = #9ccfd8
secondary   = #f6c177
alert       = #eb6f92
muted       = #6e6a86
gold        = #f6c177
teal        = #9ccfd8
foam        = #9ccfd8
iris        = #c4a7e7

; ============================================================================
; BASE BAR
; ============================================================================

[bar/base]
width               = 100%
offset-x            = 0
offset-y            = 0
radius              = 0
fixed-center        = true

background          = ${colors.background}
foreground          = ${colors.foreground}

border-size         = 0

padding-left        = 2
padding-right       = 2
module-margin       = 1

modules-left        = workspaces title
modules-center      = date
modules-right       = spinner network volume battery

bottom              = true

tray-position       = right
tray-padding        = 4
tray-background     = ${colors.background}

cursor-click        = pointer
cursor-scroll       = ns-resize
screenchange-reload = true

; ============================================================================
; LAPTOP BAR
; ============================================================================

[bar/laptop]
inherit  = bar/base
height   = 36
font-0   = "JetBrainsMono Nerd Font:size=11;3"
font-1   = "JetBrainsMono Nerd Font:size=8;2"

; ============================================================================
; MONITOR BAR
; ============================================================================

[bar/monitor]
inherit  = bar/base
height   = 28
font-0   = "JetBrainsMono Nerd Font:size=9;2"
font-1   = "JetBrainsMono Nerd Font:size=7;2"

; ============================================================================
; WORKSPACES
; ============================================================================

[module/workspaces]
type = internal/xworkspaces

icon-0       = 1;
icon-1       = 2;
icon-2       = 3;󰙯
icon-3       = 4;
icon-4       = 5;󰓇
icon-default = 

format = <label-state>

label-active            = %icon%
label-active-foreground = ${colors.primary}
label-active-padding    = 2

label-occupied            = %icon%
label-occupied-foreground = ${colors.secondary}
label-occupied-padding    = 2

label-urgent            = %icon%
label-urgent-foreground = ${colors.alert}
label-urgent-padding    = 2

label-empty            = %icon%
label-empty-foreground = ${colors.muted}
label-empty-padding    = 2

; ============================================================================
; WINDOW TITLE
; ============================================================================

[module/title]
type = internal/xwindow

label            = %title:0:40:...%
label-foreground = ${colors.muted}
label-padding    = 1

; ============================================================================
; DATE & TIME
; ============================================================================

[module/date]
type     = internal/date
interval = 1

date   = %a, %b %d
time   = %I:%M:%S %p
format = <label>

label            = %date%   %time%
label-foreground = ${colors.foreground}

; ============================================================================
; SPINNER
; ============================================================================

[module/spinner]
type     = custom/script
exec     = python3 -c "import time; s='⣾⣽⣻⢿⡿⣟⣯⣷'; print(s[int(time.time())%8])"
interval = 1

format            = <output>
format-foreground = ${colors.iris}
format-padding    = 1

; ============================================================================
; NETWORK (signal strength icon only)
; ============================================================================

[module/network]
type           = internal/network
interface-type = wireless
interval       = 3

format-connected       = <ramp-signal>
ramp-signal-0          = 󰤯
ramp-signal-1          = 󰤟
ramp-signal-2          = 󰤢
ramp-signal-3          = 󰤥
ramp-signal-4          = 󰤨
ramp-signal-foreground = ${colors.foam}

format-disconnected           = <label-disconnected>
label-disconnected            = 󰤭
label-disconnected-foreground = ${colors.muted}

; ============================================================================
; VOLUME
; ============================================================================

[module/volume]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
format-muted  = <label-muted>

label-volume            = %percentage%%
label-volume-foreground = ${colors.foreground}

label-muted            = 󰝟
label-muted-foreground = ${colors.muted}

ramp-volume-0          = 󰕿
ramp-volume-1          = 󰖀
ramp-volume-2          = 󰕾
ramp-volume-foreground = ${colors.gold}

click-right = pactl set-sink-mute @DEFAULT_SINK@ toggle
scroll-up   = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -5%

; ============================================================================
; BATTERY
; ============================================================================

[module/battery]
type          = internal/battery
battery       = BAT0
adapter       = ADP1
full-at       = 98
poll-interval = 10

format-discharging     = <ramp-capacity> <label-discharging>
format-charging        = <animation-charging> <label-charging>
format-full            = <label-full>
format-warn            = <ramp-capacity> <label-discharging>
format-warn-foreground = ${colors.alert}

ramp-capacity-0          = 󰁺
ramp-capacity-1          = 󰁻
ramp-capacity-2          = 󰁼
ramp-capacity-3          = 󰁽
ramp-capacity-4          = 󰁾
ramp-capacity-5          = 󰁿
ramp-capacity-6          = 󰂀
ramp-capacity-7          = 󰂁
ramp-capacity-8          = 󰂂
ramp-capacity-9          = 󰁹
ramp-capacity-foreground = ${colors.teal}

animation-charging-0          = 󰢜
animation-charging-1          = 󰂆
animation-charging-2          = 󰂈
animation-charging-3          = 󰂉
animation-charging-4          = 󰂊
animation-charging-foreground = ${colors.gold}
animation-charging-framerate  = 750

label-discharging         = %percentage%%
label-charging            = %percentage%%
label-charging-foreground = ${colors.gold}
label-full                = 󰂄 full
label-full-foreground     = ${colors.teal}

warn-percentage = 20
